name: Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run lint checks
        run: python -m ruff check NEAT tests --select E9,F63,F7,F82

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and type checker
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install mypy

      - name: Run type checks
        run: python -m mypy NEAT/core --ignore-missing-imports --follow-imports=silent

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v4.7.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-standalone:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got: $tag"
          }
          $version = $tag.Substring(1)
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ZIP=NEAT$tag.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build standalone app
        run: pyinstaller --noconfirm --clean NEAT.spec

      - name: Package standalone app
        shell: pwsh
        run: |
          if (Test-Path "dist\$env:RELEASE_ZIP") {
            Remove-Item "dist\$env:RELEASE_ZIP" -Force
          }
          Compress-Archive -Path dist\NEAT -DestinationPath "dist\$env:RELEASE_ZIP" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ZIP }}
          path: dist/${{ env.RELEASE_ZIP }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: NEAT ${{ env.RELEASE_TAG }}
          files: dist/${{ env.RELEASE_ZIP }}
          fail_on_unmatched_files: true
